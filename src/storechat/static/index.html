<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telescope Shop - Store Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .email-bar {
      background: #fff;
      padding: 8px 24px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .email-bar label { font-size: 13px; color: #666; }
    .email-bar input {
      flex: 1;
      max-width: 320px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #333;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant p { margin: 0.5em 0; }
    .msg.assistant p:first-child { margin-top: 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .typing {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 14px;
      color: #999;
    }
    .typing span { animation: blink 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 20% { opacity: 0.2; } 50% { opacity: 1; } }
    .input-bar {
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 16px 24px;
      display: flex;
      gap: 8px;
    }
    .input-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
    }
    .input-bar input:focus { border-color: #1a1a2e; }
    .input-bar button {
      padding: 10px 24px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
    }
    .input-bar button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>Telescope Shop - Order Assistant</h1>
  </header>
  <div class="email-bar">
    <label for="email">Your email:</label>
    <input type="email" id="email" placeholder="e.g. alice@example.com">
  </div>
  <div id="messages"></div>
  <div class="input-bar">
    <input type="text" id="question" placeholder="Ask about your order..." autofocus>
    <button id="send">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const questionEl = document.getElementById('question');
    const emailEl = document.getElementById('email');
    const sendBtn = document.getElementById('send');

    // Session ID persisted in sessionStorage
    let sessionId = sessionStorage.getItem('storechat_session');
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      sessionStorage.setItem('storechat_session', sessionId);
    }

    // Restore email from sessionStorage
    const savedEmail = sessionStorage.getItem('storechat_email');
    if (savedEmail) emailEl.value = savedEmail;
    emailEl.addEventListener('input', () => {
      sessionStorage.setItem('storechat_email', emailEl.value);
    });

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant') {
        div.innerHTML = content;
      } else {
        div.textContent = content;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const question = questionEl.value.trim();
      if (!question) return;

      const email = emailEl.value.trim();
      addMessage('user', question);
      questionEl.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const body = { question, sessionId };
        if (email) body.email = email;

        const resp = await fetch('/store-chat/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        hideTyping();
        addMessage('assistant', data.response);
      } catch (err) {
        hideTyping();
        addMessage('assistant', `Sorry, something went wrong: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        questionEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    questionEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Welcome message
    addMessage('assistant', 'Hi! I can help you check your order status or process a refund. Please enter your email above, then ask me about your order.');
  </script>
</body>
</html>
