environment:
  - devrel-opentelemetry-demo/prod-aws
# Everything the deploy needs lives in the ESC environment above (including
# all api keys, the Bedrock/pipeline config, and the domain name). These two
# keys aren't ESC-managed so they stay inline:
#   - pulumi:disable-default-providers keeps pulumi from creating an implicit
#     k8s default provider alongside our explicit one.
#   - enable-bedrock is a plain bool toggle read via config.getBoolean.
config:
  pulumi:disable-default-providers:
    - kubernetes
  devrel-opentelemetry-demo:enable-bedrock: "true"
