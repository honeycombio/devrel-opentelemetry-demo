mode: daemonset

presets:
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  logsCollection:
    enabled: true
    includeCollectorLogs: false
image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib"

service:
  enabled: true

config:
  receivers:
    jaeger: null
    zipkin: null
    kubeletstats:
      insecure_skip_verify: true
      collection_interval: 30s
      metric_groups:
        - node
        - pod
      metrics:
        k8s.node.uptime:
          enabled: true
        k8s.pod.uptime:
          enabled: true
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true
    otlp:
      protocols:
        grpc:
        http:
          cors:
            allowed_origins:
              - http://*
              - https://*
          endpoint: 0.0.0.0:4318
    filelog:
      include:
        - /var/log/pods/${env:NAMESPACE}_*/*/*.log
  processors:
    transform/service_names:
      error_mode: ignore
      log_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], attributes["app.kubernetes.io/component"]) where attributes["service.name"] == nil and attributes["app.kubernetes.io/component"] != nil
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
      metric_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
      trace_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
    transform/attribution:
      log_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
      metric_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
      trace_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
    transform/access_log_severity:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - resource.attributes["service.name"] == "access-logs"
            - attributes["http.response.status_code"] != nil
            - IsString(attributes["http.response.status_code"]) == true
          statements:
            - set(cache["status_code"], Int(attributes["http.response.status_code"]))
            - set(severity_number, 17) where cache["status_code"] >= 500
            - set(severity_number, 13) where cache["status_code"] >= 400 and cache["status_code"] < 500
            - set(severity_number, 9) where cache["status_code"] < 400
            - set(severity_text, "ERROR") where cache["status_code"] >= 500
            - set(severity_text, "WARN") where cache["status_code"] >= 400 and cache["status_code"] < 500
            - set(severity_text, "INFO") where cache["status_code"] < 400
            - set(attributes["demo.telemetry.transform.access_log_severity"], "v4")
    transform/filelog_severity:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - attributes["log.severity"] != nil
          statements:
            - set(severity_text, "ERROR") where attributes["log.severity"] == "error"
            - set(severity_number, 17) where attributes["log.severity"] == "error"
            - set(severity_text, "WARN") where attributes["log.severity"] == "warn"
            - set(severity_number, 13) where attributes["log.severity"] == "warn"
            - set(severity_text, "INFO") where attributes["log.severity"] == "info"
            - set(severity_number, 9) where attributes["log.severity"] == "info"
            - set(attributes["collector.transform.filelog_severity"], "v1")
    transform/pino_trace_fields:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - attributes["trace_id"] != nil and attributes["trace.trace_id"] == nil
          statements:
            - set(attributes["trace.trace_id"], attributes["trace_id"])
            - set(attributes["trace.parent_id"], attributes["span_id"])
            - set(attributes["meta.annotation_type"], "span_event")
    transform/parse_json_body:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - body != nil and IsString(body) and HasPrefix(body, "{")
          statements:
            - set(cache, ParseJSON(body))
            - flatten(cache, "")
            - merge_maps(attributes, cache, "upsert")
        - context: log
          statements:
            - set(resource.attributes["service.name"], "api-gateway") where resource.attributes["k8s.container.name"] == "frontend"

    filter/json_body_only:
      error_mode: ignore
      logs:
        log_record:
          - HasPrefix(body, "{") == false
          - ContainsValue(body, "\u0000") == false

    filter/warn_or_below:
        error_mode: ignore
        logs:
            log_record:
                - severity_number < SEVERITY_NUMBER_WARN

    # Drop low-signal flagd feature-flag evaluation spans from all traces:
    # client-side `/flagd.evaluation.v1.Service/*` invocations and the
    # server-side `resolveBoolean` / jsonEvaluator internals inside flagd.
    filter/drop_flagd_spans:
        error_mode: ignore
        traces:
            span:
                - attributes["rpc.service"] == "flagd.evaluation.v1.Service"
                - resource.attributes["service.name"] == "flagd"

    # Promote Strands-style gen_ai.* span-event attributes onto the parent
    # span so the latest-semconv attribute form (gen_ai.input.messages /
    # gen_ai.output.messages / gen_ai.system_instructions / gen_ai.usage.*)
    # shows up directly on chat spans. Strands emits these on
    # `gen_ai.client.inference.operation.details` events — this transform
    # copies each attribute up to span level when present.
    transform/genai_span_events_to_attributes:
        error_mode: ignore
        trace_statements:
            - context: spanevent
              conditions:
                  - IsMatch(name, "^gen_ai\\..*")
              statements:
                  - set(span.attributes["gen_ai.input.messages"], attributes["gen_ai.input.messages"]) where attributes["gen_ai.input.messages"] != nil
                  - set(span.attributes["gen_ai.output.messages"], attributes["gen_ai.output.messages"]) where attributes["gen_ai.output.messages"] != nil
                  - set(span.attributes["gen_ai.system_instructions"], attributes["gen_ai.system_instructions"]) where attributes["gen_ai.system_instructions"] != nil
                  - set(span.attributes["gen_ai.usage.input_tokens"], attributes["gen_ai.usage.input_tokens"]) where attributes["gen_ai.usage.input_tokens"] != nil
                  - set(span.attributes["gen_ai.usage.output_tokens"], attributes["gen_ai.usage.output_tokens"]) where attributes["gen_ai.usage.output_tokens"] != nil
                  - set(span.attributes["gen_ai.usage.total_tokens"], attributes["gen_ai.usage.total_tokens"]) where attributes["gen_ai.usage.total_tokens"] != nil
                  - set(span.attributes["gen_ai.response.finish_reasons"], attributes["gen_ai.response.finish_reasons"]) where attributes["gen_ai.response.finish_reasons"] != nil
                  - set(span.attributes["gen_ai.request.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil
                  - set(span.attributes["gen_ai.operation.name"], attributes["gen_ai.operation.name"]) where attributes["gen_ai.operation.name"] != nil
  exporters:
    otlp/refinery:
      endpoint: ${REFINERY_ENDPOINT}
      tls:
        insecure: true
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY}
    otlp/honeycomb:
      endpoint: api.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY}
    otlp/bindplane:
      endpoint: bindplane-node-agent.bindplane-agent:4317
      tls:
        insecure: true
    otlp/traces-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}

    otlp/metrics-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}
        x-honeycomb-dataset: service-metrics

    otlp/logging-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}
        x-honeycomb-dataset: service-logs

  service:
    pipelines:
      metrics:
        exporters:
          - otlp/honeycomb
          - otlp/metrics-dogfood
        processors:
          - transform/service_names

      logs:
        exporters:
          - otlp/refinery
          - otlp/logging-dogfood
          - otlp/bindplane
        processors:
          - transform/parse_json_body
          - transform/service_names
          - transform/access_log_severity
          - transform/filelog_severity
          - transform/pino_trace_fields
          - transform/attribution

      traces:
        exporters:
          - otlp/refinery
          - otlp/traces-dogfood
          - otlp/bindplane
        processors:
          - filter/drop_flagd_spans
          - transform/genai_span_events_to_attributes
          - transform/service_names
          - transform/attribution

clusterRole:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - nodes/proxy
      verbs:
        - get
