mode: daemonset

presets:
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  logsCollection:
    enabled: true
    includeCollectorLogs: false
image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib"

service:
  enabled: true

config:
  receivers:
    jaeger: null
    zipkin: null
    kubeletstats:
      insecure_skip_verify: true
      collection_interval: 30s
      metric_groups:
        - node
        - pod
      metrics:
        k8s.node.uptime:
          enabled: true
        k8s.pod.uptime:
          enabled: true
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true
    otlp:
      protocols:
        grpc:
        http:
          cors:
            allowed_origins:
              - http://*
              - https://*
          endpoint: 0.0.0.0:4318
    filelog:
      include:
        - /var/log/pods/${env:NAMESPACE}_*/*/*.log
      operators:
        # The helm logsCollection preset injects the container parser; we
        # need to redeclare it here because providing operators replaces
        # the preset's chain, then add recombine for accounting.
        - id: container-parser
          type: container
          max_log_size: 102400
        # Microsoft.Extensions.Logging.Console writes the category prefix
        # (`info: ...`) and each line of the message as separate stdout
        # lines, which the container parser turns into separate records.
        # Stitch them back together for our .NET services. The container
        # parser writes k8s.container.name to *resource* (not log) attributes,
        # so this predicate must use resource[...] — using attributes[...]
        # silently never matches, leaving every line as its own record.
        - type: recombine
          if: 'resource["k8s.container.name"] == "accounting" or resource["k8s.container.name"] == "cart"'
          combine_field: body
          combine_with: "\n"
          is_first_entry: 'body matches "^(trce|dbug|info|warn|fail|crit):"'
          source_identifier: attributes["log.file.path"]
          max_log_size: 102400
  processors:
    transform/service_names:
      error_mode: ignore
      log_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], attributes["app.kubernetes.io/component"]) where attributes["service.name"] == nil and attributes["app.kubernetes.io/component"] != nil
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
      metric_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
      trace_statements:
        - context: resource
          statements:
            - set(attributes["service.name"], "api-gateway") where attributes["service.name"] == "frontend"
            - set(attributes["service.name"], "ingress-gateway") where attributes["service.name"] == "frontendproxy"
    transform/attribution:
      log_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
      metric_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
      trace_statements:
        - context: resource
          statements:
            - set(attributes["collector.name"], "daemonset-collector")
    transform/access_log_severity:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - resource.attributes["service.name"] == "access-logs"
            - attributes["http.response.status_code"] != nil
            - IsString(attributes["http.response.status_code"]) == true
          statements:
            - set(cache["status_code"], Int(attributes["http.response.status_code"]))
            - set(severity_number, 17) where cache["status_code"] >= 500
            - set(severity_number, 13) where cache["status_code"] >= 400 and cache["status_code"] < 500
            - set(severity_number, 9) where cache["status_code"] < 400
            - set(severity_text, "ERROR") where cache["status_code"] >= 500
            - set(severity_text, "WARN") where cache["status_code"] >= 400 and cache["status_code"] < 500
            - set(severity_text, "INFO") where cache["status_code"] < 400
            - set(attributes["demo.telemetry.transform.access_log_severity"], "v4")
    transform/filelog_severity:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - attributes["log.severity"] != nil
          statements:
            - set(severity_text, "ERROR") where attributes["log.severity"] == "error"
            - set(severity_number, 17) where attributes["log.severity"] == "error"
            - set(severity_text, "WARN") where attributes["log.severity"] == "warn"
            - set(severity_number, 13) where attributes["log.severity"] == "warn"
            - set(severity_text, "INFO") where attributes["log.severity"] == "info"
            - set(severity_number, 9) where attributes["log.severity"] == "info"
            - set(attributes["collector.transform.filelog_severity"], "v1")
    transform/pino_trace_fields:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - attributes["trace_id"] != nil and attributes["trace.trace_id"] == nil
          statements:
            - set(attributes["trace.trace_id"], attributes["trace_id"])
            - set(attributes["trace.parent_id"], attributes["span_id"])
            - set(attributes["meta.annotation_type"], "span_event")
    transform/parse_json_body:
      error_mode: ignore
      log_statements:
        - context: log
          conditions:
            - body != nil and IsString(body) and HasPrefix(body, "{")
          statements:
            - set(cache, ParseJSON(body))
            - flatten(cache, "")
            - merge_maps(attributes, cache, "upsert")
        - context: log
          statements:
            - set(resource.attributes["service.name"], "api-gateway") where resource.attributes["k8s.container.name"] == "frontend"

    # Drain log clustering — derives a template (e.g. "user <*> logged in
    # from <*>") from each log body and writes it to log.record.template.
    # Defaults are fine for the heterogeneous mix of services here; tune
    # tree_depth/merge_threshold later if templates collide or fragment.
    drain: {}

    filter/json_body_only:
      error_mode: ignore
      logs:
        log_record:
          - HasPrefix(body, "{") == false
          - ContainsValue(body, "\u0000") == false

    filter/warn_or_below:
        error_mode: ignore
        logs:
            log_record:
                - severity_number < SEVERITY_NUMBER_WARN

    # Drop low-signal flagd feature-flag evaluation spans from all traces:
    # client-side `/flagd.evaluation.v1.Service/*` invocations and the
    # server-side `resolveBoolean` / jsonEvaluator internals inside flagd.
    filter/drop_flagd_spans:
        error_mode: ignore
        traces:
            span:
                - attributes["rpc.service"] == "flagd.evaluation.v1.Service"
                - resource.attributes["service.name"] == "flagd"

    # Keep only spans worth evaluating: store-chat's per-turn supervisor
    # invocation, and product-reviews' Bedrock chat spans (the consumer
    # filters out tool-use rounds). Same drop-everything-else pattern.
    filter/keep_eval_anchors:
        error_mode: ignore
        traces:
            span:
                - 'not ((resource.attributes["service.name"] == "store-chat" and name == "invoke_agent supervisor") or (resource.attributes["service.name"] == "product-reviews" and IsMatch(name, "^chat ")))'

    # Keep only flagd-ui's "Flag changed:" log records for the markers
    # pipeline. flagd-ui's Storage GenServer logs that string via
    # Logger.info on each flag change; filelog scrapes container stdout.
    filter/keep_flag_changes:
        error_mode: ignore
        logs:
            log_record:
                - 'not (IsString(body) and IsMatch(body, "Flag changed: "))'

    # Extract just the "Flag changed: <key> (<old> → <new>) [<source>]" line
    # into marker.message. Phoenix's Logger flushes batched entries as a
    # single stdout write, so container-parser produces one log record whose
    # body is multiple newline-separated lines. Without this regex extraction
    # the marker message becomes a wall of unrelated request/response noise.
    transform/marker_message:
        error_mode: ignore
        log_statements:
            - context: log
              conditions:
                  - 'IsString(body) and IsMatch(body, "Flag changed: ")'
              statements:
                  - 'set(attributes["marker.message"], ExtractPatterns(body, "(?P<msg>Flag changed: [^\n]+)")["msg"])'

    # Promote Strands-style gen_ai.* span-event attributes onto the parent
    # span so the latest-semconv attribute form (gen_ai.input.messages /
    # gen_ai.output.messages / gen_ai.system_instructions / gen_ai.usage.*)
    # shows up directly on chat spans. Strands emits these on
    # `gen_ai.client.inference.operation.details` events — this transform
    # copies each attribute up to span level when present.
    transform/genai_span_events_to_attributes:
        error_mode: ignore
        trace_statements:
            - context: spanevent
              conditions:
                  - IsMatch(name, "^gen_ai\\..*")
              statements:
                  - set(span.attributes["gen_ai.input.messages"], attributes["gen_ai.input.messages"]) where attributes["gen_ai.input.messages"] != nil
                  - set(span.attributes["gen_ai.output.messages"], attributes["gen_ai.output.messages"]) where attributes["gen_ai.output.messages"] != nil
                  - set(span.attributes["gen_ai.system_instructions"], attributes["gen_ai.system_instructions"]) where attributes["gen_ai.system_instructions"] != nil
                  - set(span.attributes["gen_ai.usage.input_tokens"], attributes["gen_ai.usage.input_tokens"]) where attributes["gen_ai.usage.input_tokens"] != nil
                  - set(span.attributes["gen_ai.usage.output_tokens"], attributes["gen_ai.usage.output_tokens"]) where attributes["gen_ai.usage.output_tokens"] != nil
                  - set(span.attributes["gen_ai.usage.total_tokens"], attributes["gen_ai.usage.total_tokens"]) where attributes["gen_ai.usage.total_tokens"] != nil
                  - set(span.attributes["gen_ai.response.finish_reasons"], attributes["gen_ai.response.finish_reasons"]) where attributes["gen_ai.response.finish_reasons"] != nil
                  - set(span.attributes["gen_ai.request.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil
                  - set(span.attributes["gen_ai.operation.name"], attributes["gen_ai.operation.name"]) where attributes["gen_ai.operation.name"] != nil
  exporters:
    otlp/refinery:
      endpoint: ${REFINERY_ENDPOINT}
      tls:
        insecure: true
      headers:
        x-honeycomb-team: ${HONEYCOMB_INGEST_KEY}
    otlp/honeycomb:
      endpoint: api.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_INGEST_KEY}
    otlp/bindplane:
      endpoint: bindplane-node-agent.bindplane-agent:4317
      tls:
        insecure: true
    otlp/traces-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}

    otlp/metrics-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}
        x-honeycomb-dataset: service-metrics

    otlp/logging-dogfood:
      endpoint: api-dogfood.honeycomb.io:443
      headers:
        x-honeycomb-team: ${HONEYCOMB_API_KEY_DOGFOOD}
        x-honeycomb-dataset: service-logs

    # Ships eval-anchor spans (one per chatbot turn) to the llm-evals
    # service in OTLP JSON. The consumer parses these spans and runs
    # Bias/Hallucination/Relevance scorers — no producer-side
    # publish_eval calls needed.
    kafka/llm-evals:
      brokers:
        - kafka:9092
      # Use the trace ID as the kafka message key. The default
      # `record_partitioner: sticky_key` with no key would keep bursts
      # from one collector batch on the same partition, so
      # partitionsConsumedConcurrently in the llm-evals consumer
      # wouldn't actually parallelise. With trace-id keys, anchor
      # spans (one per chat turn ⇒ unique trace ID) hash across
      # partitions evenly while spans of the same trace stay on one
      # partition — preserving per-message transactional logic.
      # NOTE: top-level key, not nested under `traces:`.
      partition_traces_by_id: true
      # As of kafkaexporter v0.151+, topic/encoding live under per-signal
      # subkeys. This pipeline ships traces, so configure under `traces:`.
      traces:
        topic: llm-evals-spans
        encoding: otlp_json
      producer:
        max_message_bytes: 10000000

    # Posts an environment-level Honeycomb marker per flagd-ui flag-change
    # log record (the line transform/marker_message extracted into
    # marker.message). Registered in ocb-config.yaml so otelcol-dev includes
    # honeycombmarkerexporter.
    honeycombmarker:
      api_key: ${HONEYCOMB_MARKERS_KEY}
      markers:
        - type: feature-flag-change
          message_key: marker.message
          rules:
            log_conditions:
              - 'IsString(body) and IsMatch(body, "Flag changed: ")'

  service:
    pipelines:
      metrics:
        exporters:
          - otlp/honeycomb
          - otlp/metrics-dogfood
        processors:
          - transform/service_names

      logs:
        exporters:
          - otlp/refinery
          - otlp/logging-dogfood
          - otlp/bindplane
        processors:
          - transform/parse_json_body
          - transform/service_names
          - transform/access_log_severity
          - transform/filelog_severity
          - transform/pino_trace_fields
          - transform/attribution
          - drain

      traces:
        exporters:
          - otlp/refinery
          - otlp/traces-dogfood
          - otlp/bindplane
        processors:
          - filter/drop_flagd_spans
          - transform/genai_span_events_to_attributes
          - transform/service_names
          - transform/attribution

      # Eval anchor pipeline. Pushes one span per chatbot turn to Kafka;
      # the llm-evals service consumes and runs Bias/Hallucination/Relevance.
      # genai_span_events_to_attributes runs first to promote Strands-style
      # event attributes onto the span — without that, invoke_agent spans
      # arrive at the consumer with gen_ai.input.messages still on the
      # span event and the consumer skips them.
      traces/evals:
        receivers: [otlp]
        processors: [transform/genai_span_events_to_attributes, filter/keep_eval_anchors]
        exporters: [kafka/llm-evals]

      # Isolated pipeline that publishes a Honeycomb marker per
      # flagd-ui flag-change log record. Receives a separate copy of
      # filelog data so it doesn't interfere with the main logs pipeline.
      logs/markers:
        receivers:
          - filelog
        processors:
          - filter/keep_flag_changes
          - transform/marker_message
        exporters:
          - honeycombmarker

clusterRole:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - nodes/proxy
      verbs:
        - get
