default:
  image:
    repository: "ghcr.io/honeycombio/devrel-opentelemetry-demo"
    tag: "latest"
  replicas: 2
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=latest"
components:
  accounting:
    service:
      port: 5060
    resources:
      limits:
        memory: 200Mi
    envOverrides:
      - name: PAYMENT_ADDR
        value: payment:8080
      - name: ACCOUNTING_SERVICE_PORT
        value: "5060"
      - name: ASPNETCORE_URLS
        value: "http://*:5060"
  load-generator:
    replicas: 2
  frontend:
    replicas: 2
    envOverrides:
      - name: PRODUCT_REVIEWS_ADDR
        value: product-reviews:3551
      - name: ACCOUNTING_ADDR
        value: accounting:5060
  postgresql:
    resources:
      limits:
        memory: 512Mi
  frontend-proxy:
    envOverrides:
      - name: ENVOY_ADDR
        value: 0.0.0.0
      - name: STORE_CHAT_HOST
        value: "store-chat"
      - name: STORE_CHAT_PORT
        value: "8080"
      - name: LLM_EVALS_PORT
        value: "8088"
  flagd:
    # Rebind the chart's `config-ro` volume to our flagd-custom-config ConfigMap
    # (a superset of the chart's default flags). flagd and the flagd-ui sidecar
    # both mount config-ro, so the UI can now see and edit every flag.
    additionalVolumes:
      - name: config-ro
        configMap:
          name: flagd-custom-config
    # Redeclare the chart's flagd-ui sidecar. Required because skaffold's
    # `--set components.flagd.sidecarContainers[0].imageOverride.*` creates a
    # sparse array element that *replaces* the chart-default sidecar (Helm's
    # --set on arrays doesn't merge into chart defaults). Without this redecl
    # the rendered sidecar has no `name`, and _objects.tpl errors on
    # `.name | lower`. Service identity intentionally inherits from chart
    # defaults (OTEL_SERVICE_NAME → fieldRef on component label = "flagd"),
    # so we don't override env here.
    sidecarContainers:
      - name: flagd-ui
        useDefault:
          env: true
        service:
          port: 4000
        env:
          - name: FLAGD_METRICS_EXPORTER
            value: otel
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://$(OTEL_COLLECTOR_NAME):4318
          - name: FLAGD_UI_PORT
            value: "4000"
          - name: SECRET_KEY_BASE
            value: yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw
        volumeMounts:
          - name: config-rw
            mountPath: /app/data

opentelemetry-collector:
  enabled: false

jaeger:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

opensearch:
  enabled: false
