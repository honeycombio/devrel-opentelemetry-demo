default:
  image:
    repository: "ghcr.io/honeycombio/devrel-opentelemetry-demo"
    tag: "latest"
  replicas: 2
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=latest"
components:
  accounting:
    service:
      port: 5060
    resources:
      limits:
        memory: 150Mi
    envOverrides:
      - name: PAYMENT_ADDR
        value: payment:8080
      - name: ACCOUNTING_SERVICE_PORT
        value: "5060"
      - name: ASPNETCORE_URLS
        value: "http://*:5060"
  load-generator:
    replicas: 2
  frontend:
    replicas: 2
    envOverrides:
      - name: PRODUCT_REVIEWS_ADDR
        value: product-reviews:3551
      - name: ACCOUNTING_ADDR
        value: accounting:5060
  postgresql:
    resources:
      limits:
        memory: 512Mi
  frontend-proxy:
    envOverrides:
      - name: ENVOY_ADDR
        value: 0.0.0.0
      - name: CHATBOT_PORT
        value: "8087"
      - name: STORE_CHAT_HOST
        value: "store-chat"
      - name: STORE_CHAT_PORT
        value: "8080"
      - name: LLM_EVALS_PORT
        value: "8088"
  flagd:
    # Rebind the chart's `config-ro` volume to our flagd-custom-config ConfigMap
    # (a superset of the chart's default flags). flagd and the flagd-ui sidecar
    # both mount config-ro, so the UI can now see and edit every flag.
    additionalVolumes:
      - name: config-ro
        configMap:
          name: flagd-custom-config

opentelemetry-collector:
  enabled: false

jaeger:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

opensearch:
  enabled: false
