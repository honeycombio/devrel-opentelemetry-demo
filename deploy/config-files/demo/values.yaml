default:
  image:
    repository: "ghcr.io/honeycombio/devrel-opentelemetry-demo"
    tag: "latest"
  replicas: 2
  envOverrides:
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=latest"
components:
  accounting:
    resources:
      limits:
        memory: 150Mi
  load-generator:
    replicas: 2
  frontend:
    replicas: 2
    envOverrides:
      - name: PRODUCT_REVIEWS_ADDR
        value: product-reviews:3551
  postgresql:
    resources:
      limits:
        memory: 512Mi
  frontend-proxy:
    envOverrides:
      - name: ENVOY_ADDR
        value: 0.0.0.0
      - name: CHATBOT_PORT
        value: "8087"
      - name: LLM_EVALS_PORT
        value: "8088"
  flagd:
    # Load custom flags (chatbot.enabled, llm flags, etc.) from a second ConfigMap
    # managed by Pulumi, alongside the chart's built-in flagd-config.
    command:
      - "/flagd-build"
      - "start"
      - "--port"
      - "8013"
      - "--ofrep-port"
      - "8016"
      - "--uri"
      - "file:./etc/flagd/demo.flagd.json"
      - "--uri"
      - "file:./etc/flagd-custom/demo.flagd.json"
    additionalVolumes:
      - name: config-ro
        configMap:
          name: flagd-config
      - name: config-custom
        configMap:
          name: flagd-custom-config
    additionalVolumeMounts:
      - name: config-custom
        mountPath: /etc/flagd-custom

opentelemetry-collector:
  enabled: false

jaeger:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

opensearch:
  enabled: false
