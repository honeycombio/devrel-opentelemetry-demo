namespace: default

services:
  productReviews:
    enabled: true
    name: product-reviews
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-product-reviews
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    port: 3551
    replicas: 1
    env:
      - name: PRODUCT_REVIEWS_PORT
        value: "3551"
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"
      - name: OTEL_SEMCONV_STABILITY_OPT_IN
        value: "gen_ai_latest_experimental"
      # Suppress botocore auto-instrumentation: the Bedrock extension emits a
      # duplicate `chat <modelId>` span plus per-message events via the Events
      # API, all of which we already capture on our llm.chat wrapper span.
      # Product-reviews only uses boto3 for Bedrock, so disabling the whole
      # botocore package is safe here.
      - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
        value: "botocore"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: "python"
      - name: DB_CONNECTION_STRING
        value: "host=postgresql user=otelu password=otelp dbname=otel"
      # Switch the LLM backend. `bedrock` uses our Pod Identity to call the
      # AWS Bedrock Converse API; `openai` falls back to the upstream fake `src/llm/`.
      - name: LLM_PROVIDER
        value: "bedrock"
      - name: AWS_REGION
        value: "eu-west-1"
      - name: BEDROCK_HAIKU_PROFILE_ARN
        value: "arn:aws:bedrock:eu-west-1:657166037864:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0"
      # Retained so LLM_PROVIDER=openai still works as the A/B option.
      - name: LLM_BASE_URL
        value: "http://llm:8000/v1"
      - name: OPENAI_API_KEY
        value: "dummy"
      - name: LLM_MODEL
        value: "astronomy-llm"
      - name: PRODUCT_CATALOG_ADDR
        value: "product-catalog:8080"
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"
      - name: LLM_HOST
        value: "llm"
      - name: LLM_PORT
        value: "8000"

  llmEvals:
    enabled: false
    name: llm-evals
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-llm-evals
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    awsRegion: ""
    bedrockHaikuProfileArn: ""
    kafkaAddr: ""
    replicas: 1
    env: []

  storechat:
    enabled: true
    name: store-chat
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-storechat
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    awsRegion: ""
    bedrockHaikuProfileArn: ""
    port: 8080
    replicas: 1
    env:
      - name: STORE_CHAT_PORT
        value: "8080"
      - name: ACCOUNTING_ADDR
        value: "accounting:5060"
      - name: SHIPPING_ADDR
        value: "http://shipping:8080"
      - name: VALKEY_ADDR
        value: "valkey-cart:6379"
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_OFREP_PORT
        value: "8016"
      - name: OTEL_SEMCONV_STABILITY_OPT_IN
        value: "gen_ai_latest_experimental"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"

  llm:
    enabled: true
    name: llm
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-llm
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    port: 8000
    replicas: 1
    env:
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"

otel:
  collectorName: otel-collector
  metricsTemporality: delta

ingress:
  enabled: false
  className: alb
  subDomainName: "" # e.g. "martin-local"
  domainName: ""
  generateCertificate: false
  # Example: zurelia.honeydemo.io
