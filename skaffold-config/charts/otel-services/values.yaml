namespace: default

services:
  chatbot:
    enabled: true
    name: chatbot
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-chatbot
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    anthropicApiKey: ""
    openaiApiKey: ""
    port: 8087
    replicas: 1
    env:
      - name: CHATBOT_PORT
        value: "8087"
      - name: FRONTEND_ADDR
        value: "http://frontend:8080"
      - name: LLM_EVALS_ADDR
        value: "http://llm-evals:8088"
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"

  productReviews:
    enabled: true
    name: product-reviews
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-product-reviews
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    port: 3551
    replicas: 1
    env:
      - name: PRODUCT_REVIEWS_PORT
        value: "3551"
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: "python"
      - name: DB_CONNECTION_STRING
        value: "host=postgresql user=otelu password=otelp dbname=otel"
      - name: LLM_BASE_URL
        value: "http://llm:8000/v1"
      - name: OPENAI_API_KEY
        value: "dummy"
      - name: LLM_MODEL
        value: "astronomy-llm"
      - name: PRODUCT_CATALOG_ADDR
        value: "product-catalog:3550"
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"
      - name: LLM_HOST
        value: "llm"
      - name: LLM_PORT
        value: "8000"

  llmEvals:
    enabled: true
    name: llm-evals
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-llm-evals
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    openaiApiKey: ""
    port: 8088
    replicas: 1
    env:
      - name: LLM_EVALS_PORT
        value: "8088"
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"

  llm:
    enabled: true
    name: llm
    image:
      repository: ghcr.io/honeycombio/devrel-opentelemetry-demo
      tag: latest-llm
      pullPolicy: IfNotPresent
    imageOverride:
      {}
    port: 8000
    replicas: 1
    env:
      - name: FLAGD_HOST
        value: "flagd"
      - name: FLAGD_PORT
        value: "8013"

otel:
  collectorName: otel-collector
  metricsTemporality: delta

ingress:
  enabled: false
  className: alb
  subDomainName: "" # e.g. "martin-local"
  domainName: ""
  generateCertificate: false
  # Example: zurelia.honeydemo.io
