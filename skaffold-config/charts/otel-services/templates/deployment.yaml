{{- if .Values.services.chatbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.chatbot.name }}
  labels:
    opentelemetry.io/name: {{ .Values.services.chatbot.name }}
    app.kubernetes.io/component: {{ .Values.services.chatbot.name }}
    app.kubernetes.io/name: {{ .Values.services.chatbot.name }}
    app.kubernetes.io/version: "2.1.3"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: {{ .Values.services.chatbot.replicas }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: {{ .Values.services.chatbot.name }}
  template:
    metadata:
      labels:
        opentelemetry.io/name: {{ .Values.services.chatbot.name }}
        app.kubernetes.io/component: {{ .Values.services.chatbot.name }}
        app.kubernetes.io/name: {{ .Values.services.chatbot.name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: {{ .Values.services.chatbot.name }}
          image: "{{ if .Values.services.chatbot.imageOverride.repository }}{{ .Values.services.chatbot.imageOverride.repository }}{{ else }}{{ .Values.services.chatbot.image.repository }}{{ end }}:{{ if .Values.services.chatbot.imageOverride.tag }}{{ .Values.services.chatbot.imageOverride.tag }}{{ else }}{{ .Values.services.chatbot.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.services.chatbot.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.chatbot.port }}
              name: service
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: {{ .Values.otel.collectorName }}
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: {{ .Values.otel.metricsTemporality }}
            {{- range .Values.services.chatbot.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: ANTHROPIC_API_KEY
              value: {{ .Values.services.chatbot.anthropicApiKey | quote }}
            - name: OPENAI_API_KEY
              value: {{ .Values.services.chatbot.openaiApiKey | quote }}
            {{- if .Values.services.chatbot.awsRegion }}
            - name: AWS_REGION
              value: {{ .Values.services.chatbot.awsRegion | quote }}
            - name: BEDROCK_HAIKU_PROFILE_ARN
              value: {{ .Values.services.chatbot.bedrockHaikuProfileArn | quote }}
            - name: BEDROCK_SONNET_PROFILE_ARN
              value: {{ .Values.services.chatbot.bedrockSonnetProfileArn | quote }}
            {{- end }}
            {{- if .Values.services.llmEvals.enabled }}
            - name: LLM_EVALS_ADDR
              value: "http://{{ .Values.services.llmEvals.name }}:{{ .Values.services.llmEvals.port }}"
            {{- end }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(OTEL_COLLECTOR_NAME):4317
---
{{- end }}
