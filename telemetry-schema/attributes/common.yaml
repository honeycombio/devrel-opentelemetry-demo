groups:
  - id: app.cache
    type: attribute_group
    brief: Caching attributes
    stability: stable
    attributes:
      - id: app.recommendation.cache_enabled
        type: boolean
        brief: Whether recommendation caching is enabled
        stability: stable
        note: Indicates whether the recommendation service has caching enabled for this request
      - id: app.cache_hit
        type: boolean
        brief: Whether the recommendation cache was hit
        stability: stable
        note: Indicates whether the recommendation was served from cache (true) or computed fresh (false)

  - id: app.products
    type: attribute_group
    brief: Product catalog attributes
    stability: stable
    attributes:
      - id: app.products_recommended.count
        type: int
        brief: Number of products recommended
        stability: stable
        note: The count of products recommended to the user
        examples: [5, 10, 15]
      - id: app.products.count
        type: int
        brief: Total number of products available
        stability: stable
        note: The total number of products available in the product catalog at the time of the recommendation request
        examples: [100, 500, 1000]
      - id: app.filtered_products.count
        type: int
        brief: Number of products after filtering
        stability: stable
        note: The number of products remaining after applying filters (e.g., availability, category, price range)
        examples: [5, 20, 50]
      - id: app.filtered_products.list
        type: string
        brief: Comma-separated list of filtered product IDs
        stability: stable
        note: A comma-separated list of product IDs that were included in the filtered product set
        examples: ["OLJCESPC7Z,9SOIN3QJO0,6E92ZMJLZN"]

  - id: app.email
    type: attribute_group
    brief: Email communication attributes
    stability: stable
    attributes:
      - id: app.email.recipient
        type: string
        brief: Email recipient address
        stability: stable
        note: The email address of the recipient for whom the email is being sent. This is typically used for order confirmation emails and other transactional communications.
        examples: ["customer@example.com", "user@domain.org"]

  - id: app.loyalty
    type: attribute_group
    brief: Customer loyalty attributes
    stability: stable
    attributes:
      - id: app.loyalty.level
        type: string
        brief: Customer loyalty level
        stability: stable
        note: The loyalty tier or level of the customer making the payment. This can be used to track payment patterns by customer segment.
        examples: ["gold", "silver", "bronze", "standard"]

  - id: app.payment
    type: attribute_group
    brief: Payment transaction attributes
    stability: stable
    attributes:
      - id: app.payment.charged
        type: boolean
        brief: Whether payment was successfully charged
        stability: stable
        note: Indicates whether the payment transaction was successfully charged to the customer's payment method (true) or failed (false)

  - id: app.product
    type: attribute_group
    brief: Product information attributes
    stability: stable
    attributes:
      - id: app.product.id
        type: string
        brief: Product identifier
        stability: stable
        note: The unique identifier of the product being reviewed or for which reviews are being retrieved
        examples: ["66VCHSJNUP", "OLJCESPC7Z", "9SOIN3QJO0"]
      - id: app.product.name
        type: string
        brief: Product name
        stability: stable
        note: The name or title of the product
        examples: ["Wireless Headphones", "Coffee Maker", "Running Shoes"]
      - id: app.product.question
        type: string
        brief: Product review question
        stability: stable
        note: A question or query related to product reviews, such as a customer inquiry about product features or quality
        examples: ["Is this product durable?", "What is the warranty?"]

  - id: app.product_reviews
    type: attribute_group
    brief: Product review metrics attributes
    stability: stable
    attributes:
      - id: app.product_reviews.count
        type: int
        brief: Number of product reviews
        stability: stable
        note: The count of reviews returned or processed for a specific product
        examples: [5, 10, 25]
      - id: app.product_reviews.average_score
        type: double
        brief: Average review score
        stability: stable
        note: The average rating score across all reviews for a product, typically on a scale of 1-5
        examples: [4.5, 3.2, 4.8]

  - id: app.session
    type: attribute_group
    brief: User session attributes
    stability: stable
    attributes:
      - id: session.id
        type: string
        brief: Session identifier
        stability: stable
        note: A unique identifier for the user session. This can be used to correlate multiple requests from the same user across different services and time periods.
        examples: ["session-123abc", "user-456def"]

  - id: app.request
    type: attribute_group
    brief: Request classification attributes
    stability: stable
    attributes:
      - id: app.synthetic_request
        type: boolean
        brief: Whether the request is synthetic/test traffic
        stability: stable
        note: Indicates whether the request is synthetic traffic generated for testing or monitoring purposes (true) or real user traffic (false). This helps distinguish production traffic from test traffic in observability systems.

  - id: app.ads
    type: attribute_group
    brief: Advertisement service attributes
    stability: stable
    attributes:
      - id: app.ads.category
        type: string
        brief: Advertisement category
        stability: stable
        note: The category of advertisements being served
        examples: ["electronics", "clothing", "home"]
      - id: app.ads.count
        type: int
        brief: Number of advertisements served
        stability: stable
        note: The count of advertisements returned or served in a request
        examples: [1, 2, 5]

  - id: app.user
    type: attribute_group
    brief: User information attributes
    stability: stable
    attributes:
      - id: app.user.id
        type: string
        brief: User identifier
        stability: stable
        note: The unique identifier of the user making the request
        examples: ["user-123", "customer-456"]
      - id: app.user.currency
        type: string
        brief: User's preferred currency
        stability: stable
        note: The currency code preferred by the user for pricing and transactions
        examples: ["USD", "EUR", "GBP"]
      - id: app.user.city
        type: string
        brief: User's city
        stability: stable
        note: The city where the user is located or has provided as their address
        examples: ["New York", "London", "Tokyo"]

  - id: app.order
    type: attribute_group
    brief: Order and checkout attributes
    stability: stable
    attributes:
      - id: app.order.id
        type: string
        brief: Order identifier
        stability: stable
        note: The unique identifier for an order
        examples: ["order-123", "ORD-456789"]
      - id: app.order.amount
        type: double
        brief: Total order amount
        stability: stable
        note: The total monetary amount of the order
        examples: [99.99, 150.50]
      - id: app.order.items.count
        type: int
        brief: Number of items in order
        stability: stable
        note: The count of distinct items in the order
        examples: [1, 5, 10]

  - id: app.cart
    type: attribute_group
    brief: Shopping cart attributes
    stability: stable
    attributes:
      - id: app.cart.items.count
        type: int
        brief: Number of items in cart
        stability: stable
        note: The count of items currently in the shopping cart
        examples: [0, 3, 7]

  - id: app.shipping
    type: attribute_group
    brief: Shipping and logistics attributes
    stability: stable
    attributes:
      - id: app.shipping.amount
        type: double
        brief: Shipping cost amount
        stability: stable
        note: The monetary amount charged for shipping
        examples: [5.99, 15.00]
      - id: app.shipping.cost.total
        type: string
        brief: Total shipping cost
        stability: stable
        note: The total cost of shipping for an order
        examples: ["10.50", "25.00"]
      - id: app.shipping.items_count
        type: int
        brief: Number of items being shipped
        stability: stable
        note: The count of items included in a shipment
        examples: [1, 5, 10]
      - id: app.shipping.tracking_id
        type: string
        brief: Shipping tracking identifier
        stability: stable
        note: The tracking number or identifier for a shipment
        examples: ["TRACK-123456", "SHP-789012"]

  - id: app.quote
    type: attribute_group
    brief: Quote and pricing attributes
    stability: stable
    attributes:
      - id: app.quote.items.count
        type: int
        brief: Number of items in quote
        stability: stable
        note: The count of items included in a pricing quote
        examples: [1, 5, 10]
      - id: app.quote.cost.total
        type: double
        brief: Total quote cost
        stability: stable
        note: The total monetary amount of a quote
        examples: [89.99, 150.00]

  - id: app.order.confirmation
    type: attribute_group
    brief: Order confirmation attributes
    stability: stable
    attributes:
      - id: app.order.confirmation.id
        type: string
        brief: Order confirmation identifier
        stability: stable
        note: The unique identifier for an order confirmation
        examples: ["conf-123", "CONF-456789"]

